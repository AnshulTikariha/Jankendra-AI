# Disabled in favour of GCP Cloud Build (deploy/gcp/cloudbuild.yaml).
# Credentials stay in GCP Secret Manager — not in GitHub secrets.
#
# To deploy: merge to release branch (Cloud Build auto-runs).
# Manual GitHub deploy (fallback only):
name: Deploy release to GCP VM (manual fallback)

on:
  workflow_dispatch:

concurrency:
  group: deploy-release
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Use GCP Cloud Build instead
        run: |
          echo "Auto-deploy is handled by GCP Cloud Build on push to release."
          echo "See deploy/gcp/setup-cloud-build.sh and deploy/CICD-SETUP.md"
          exit 1
