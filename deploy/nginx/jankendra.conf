# Jankendra-AI — single VM reverse proxy
# Frontend static files + backend API (8000) + AI modules API (8001)

upstream jankendra_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

upstream jankendra_ai {
    server 127.0.0.1:8001;
    keepalive 8;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20m;

    root /opt/jankendra/frontend/dist;
    index index.html;

    # AI modules (no auth)
    location = /api/v1/analyze-text {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://jankendra_ai;
    }

    location = /api/v1/health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://jankendra_backend;
    }

    # AI service health + docs (optional direct access)
    location /ai/ {
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://jankendra_ai;
    }

    # Main backend API
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://jankendra_backend;
    }

    location /docs {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://jankendra_backend;
    }

    location /redoc {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://jankendra_backend;
    }

    location /health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://jankendra_backend;
    }

    # React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
